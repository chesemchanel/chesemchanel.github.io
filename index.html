<!DOCTYPE html>
<html>
<head>
    <title>Chesem Chanel</title>
    <style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease-in-out;
}

h1 {
    color: #333;
}

.skills {
    margin-top: 15px;
}

.skills span {
    display: inline-block;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
    color: white;
    font-size: 14px;
}

.skills span:nth-child(1) { background: #e34c26; }
.skills span:nth-child(2) { background: #f7df1e; color: black; }
.skills span:nth-child(3) { background: #306998; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

    </style>
</head>

<body>

    <div class="card">
        <h1>Hello, I'm Chesem Chanel 👋</h1>
        <p>I am studying programming.</p>

        <div class="skills">
            <span>HTML</span>
            <span>JavaScript</span>
            <span>Python</span>
        </div>

        <p style="margin-top:20px;">🎮 I love gaming</p>
    </div>

</body>
</html>
